services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: ask-acme-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      # Qdrant images don't include curl/wget, so use bash's /dev/tcp to probe the port
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ask-acme-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acme}
      POSTGRES_DB: ${POSTGRES_DB:-acme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acme} -d ${POSTGRES_DB:-acme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: python:3.12-slim
    container_name: ask-acme-app
    restart: unless-stopped
    working_dir: /app
    # Placeholder command — replace once the app exists.
    # Keeps the container alive so `docker compose up` doesn't exit immediately.
    command: ["python", "-c", "import time; print('app placeholder running'); time.sleep(infinity := 10**9)"]
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql://${POSTGRES_USER:-acme}:${POSTGRES_PASSWORD:-acme}@postgres:5432/${POSTGRES_DB:-acme}
    volumes:
      - ./:/app
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # Trivially passes for the placeholder. Replace with a real /health endpoint check
      # once you have an HTTP server, e.g.:
      #   test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      test: ["CMD-SHELL", "python -c 'print(1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qdrant_data:
  postgres_data: