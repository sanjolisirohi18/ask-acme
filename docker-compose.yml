services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: ask-acme-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      # Qdrant images don't include curl/wget, so use bash's /dev/tcp to probe the port
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ask-acme-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acme}
      POSTGRES_DB: ${POSTGRES_DB:-acme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acme} -d ${POSTGRES_DB:-acme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: python:3.13-slim
    container_name: ask-acme-app
    restart: unless-stopped
    working_dir: /app
    # Placeholder command — replace once the app exists.
    # Keeps the container alive so `docker compose up` doesn't exit immediately.
    command: ["python", "-c", "import time; print('app placeholder running'); time.sleep(infinity := 10**9)"]
    environment:
      # The app reads individual settings (see src/ask_acme/config.py), not a
      # single DATABASE_URL / QDRANT_URL — it composes the DSNs itself. Other
      # values are interpolated from your shell or .env. Keep these var names in
      # sync with config.py and .env.example.
      #
      # POSTGRES_HOST / QDRANT_HOST are set to the in-network service names ON
      # PURPOSE and must stay: config.py defaults them to "localhost" (for
      # host-machine runs), which would NOT resolve from inside this container.
      POSTGRES_USER: ${POSTGRES_USER:-acme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acme}
      POSTGRES_DB: ${POSTGRES_DB:-acme}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_HOST: qdrant
      QDRANT_HTTP_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-ask_acme_docs}
      # Set QDRANT_API_KEY only when the Qdrant service has auth enabled.
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your shell or .env}
    volumes:
      - ./:/app
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # Trivially passes for the placeholder. Replace with a real /health endpoint check
      # once you have an HTTP server, e.g.:
      #   test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      test: ["CMD-SHELL", "python -c 'print(1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qdrant_data:
  postgres_data: